<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">Bitronix Lab logo</title>
  <desc id="desc">A neon metallic B monogram with circuit traces.</desc>
  <defs>
    <linearGradient id="metal" x1="22" x2="188" y1="30" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.18" stop-color="#aeb8c2"/>
      <stop offset="0.42" stop-color="#f7fbff"/>
      <stop offset="0.68" stop-color="#67717e"/>
      <stop offset="1" stop-color="#f8fcff"/>
    </linearGradient>
    <linearGradient id="neon" x1="34" x2="190" y1="178" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00f5ff"/>
      <stop offset="0.48" stop-color="#0577ff"/>
      <stop offset="1" stop-color="#33f6ff"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="52%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.22" stop-color="#5ffaff"/>
      <stop offset="0.68" stop-color="#0577ff"/>
      <stop offset="1" stop-color="#001f34" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.02 0 0 0 0 0.65 0 0 0 0 1 0 0 0 0.85 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .trace {
        stroke-dasharray: 82;
        animation: traceMove 3.8s linear infinite;
      }
      .pulse {
        animation: pulseGlow 2.4s ease-in-out infinite;
      }
      .halo {
        animation: haloSpin 18s linear infinite;
        transform-origin: 110px 110px;
      }
      @keyframes traceMove {
        to { stroke-dashoffset: -164; }
      }
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.72; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.12); }
      }
      @keyframes haloSpin {
        to { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <rect width="220" height="220" rx="34" fill="#03070b"/>
  <path class="halo" d="M32 38H188M36 184H184M38 32V188M182 36V184" stroke="#062b4d" stroke-width="2" opacity="0.55"/>
  <path d="M58 30L91 62V158L57 190H154C178 190 196 174 196 151C196 134 187 121 171 114C184 106 191 94 191 78C191 51 171 30 140 30H58Z" fill="#07101a"/>
  <path d="M74 46H139C160 46 174 60 174 78C174 96 160 108 139 108H112V126H151C169 126 180 136 180 151C180 166 168 174 151 174H74V46Z" fill="url(#metal)"/>
  <path d="M58 30L91 62V158L57 190" fill="none" stroke="url(#neon)" stroke-width="6" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M74 46H139C160 46 174 60 174 78C174 96 160 108 139 108H112M112 126H151C169 126 180 136 180 151C180 166 168 174 151 174H74" fill="none" stroke="url(#neon)" stroke-width="2.4" filter="url(#glow)"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path class="trace" d="M23 74H44L61 91H92" stroke="#00f5ff" stroke-width="3"/>
    <path class="trace" d="M25 111H55L70 126H101" stroke="#00d7ff" stroke-width="3"/>
    <path class="trace" d="M24 146H48L67 128H96" stroke="#00f5ff" stroke-width="3"/>
    <path class="trace" d="M112 83H151L162 72" stroke="#00f5ff" stroke-width="2.4"/>
    <path class="trace" d="M114 148H145L159 132H185" stroke="#067bff" stroke-width="2.4"/>
    <path class="trace" d="M112 101H132L146 88H168" stroke="#067bff" stroke-width="2.4"/>
  </g>

  <g fill="#06121f" stroke="#00f5ff" stroke-width="3" filter="url(#glow)">
    <circle class="pulse" cx="23" cy="74" r="5"/>
    <circle class="pulse" cx="25" cy="111" r="5"/>
    <circle class="pulse" cx="24" cy="146" r="5"/>
    <circle class="pulse" cx="168" cy="88" r="4"/>
    <circle class="pulse" cx="185" cy="132" r="4"/>
  </g>

  <g filter="url(#glow)">
    <rect x="122" y="132" width="34" height="34" rx="6" fill="#07111d" stroke="#8ff9ff" stroke-width="2.6"/>
    <rect x="130" y="140" width="18" height="18" rx="3" fill="url(#coreGlow)"/>
    <path d="M139 123V132M139 166V176M113 149H122M156 149H166M121 131L115 125M157 131L164 124M121 167L115 173M157 167L164 174" stroke="#00f5ff" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
